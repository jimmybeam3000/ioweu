<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <link rel="manifest" href="manifest.webmanifest">
  <title>IoweU</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <b>IoweU</b>
        <small>Offline • GitHub Pages • .iou Dateien</small>
      </div>
      <button id="install" hidden>Installieren</button>
    </header>

    <section id="install-banner" class="banner hide"></section>

    <nav class="tabs" aria-label="Navigation">
      <button type="button" data-view="start">Start</button>
      <button type="button" data-action="open-lend" data-role="lend">Verleihen</button>
      <button type="button" data-action="open-lend" data-role="borrow">Ich leihe mir</button>
      <button type="button" data-view="import">Import</button>
      <button type="button" data-view="profile">Profil</button>
    </nav>

    <section id="view-start" class="view"></section>
    <section id="view-lend" class="view hide"></section>
    <section id="view-import" class="view hide"></section>
    <section id="view-profile" class="view hide"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
